version: '3.9'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: safe_city_hawassa
      MYSQL_USER: safecity
      MYSQL_PASSWORD: safecity123
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: mysql://safecity:safecity123@mysql:3306/safe_city_hawassa
      JWT_SECRET: dev-jwt-secret
      REFRESH_TOKEN_SECRET: dev-refresh-secret
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mysql
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  mysql_data:
